name: hccs

services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:?set it in .env (see .env.example)}
      - SERVICES=s3,sqs,lambda,iam,logs
      - DEBUG=0
      # Run Lambda containers on the compose network so they can reach
      # postgres and localstack by hostname. <project>_default = hccs_default.
      - LAMBDA_DOCKER_NETWORK=hccs_default
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler
      POSTGRES_DB: scheduler
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler"]
      interval: 5s
      timeout: 5s
      retries: 20

  infra:
    build: ./infra
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_DEFAULT_REGION=us-east-1
      # tflocal reads the LocalStack endpoint from AWS_ENDPOINT_URL (host+port).
      - AWS_ENDPOINT_URL=http://localstack:4566
      # Pin the S3 host so it resolves on the compose network (tflocal otherwise
      # defaults to s3.localhost.localstack.cloud, which is not reachable here).
      - S3_HOSTNAME=localstack
    volumes:
      - ./infra/terraform:/terraform
    working_dir: /terraform
    command:
      - sh
      - -c
      - "tflocal init -input=false && tflocal apply -auto-approve -input=false"

  migrate:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SCHEDULER_DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
    command: ["uv", "run", "alembic", "upgrade", "head"]

  campaign-api:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SCHEDULER_DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      - SCHEDULER_AWS_ENDPOINT_URL=http://localstack:4566
      - SCHEDULER_S3_PUBLIC_ENDPOINT_URL=http://localhost:4566
    ports:
      - "8000:8000"

  scheduler:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SCHEDULER_DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      - SCHEDULER_AWS_ENDPOINT_URL=http://localstack:4566
    command: ["uv", "run", "python", "-m", "scheduler.main"]

  mock-provider:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    environment:
      - MOCK_PROVIDER_FAILURE_RATE=0.0
      - MOCK_PROVIDER_LATENCY_MS=0
    command: ["uv", "run", "uvicorn", "mock_provider.main:app", "--host", "0.0.0.0", "--port", "9001"]
    ports:
      - "9001:9001"

  dispatch-worker:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SCHEDULER_DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      - SCHEDULER_AWS_ENDPOINT_URL=http://localstack:4566
      - SCHEDULER_PROVIDER_BASE_URL=http://mock-provider:9001
    command: ["uv", "run", "python", "-m", "dispatch_worker.main"]

  outcome-service:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SCHEDULER_DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      - SCHEDULER_AWS_ENDPOINT_URL=http://localstack:4566
    command: ["uv", "run", "uvicorn", "outcome_service.main:app", "--host", "0.0.0.0", "--port", "9002"]
    ports:
      - "9002:9002"

  mock-crm:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    environment:
      - MOCK_CRM_FAILURE_RATE=0.0
      - MOCK_CRM_LATENCY_MS=0
    command: ["uv", "run", "uvicorn", "mock_crm.main:app", "--host", "0.0.0.0", "--port", "9003"]
    ports:
      - "9003:9003"

  crm-worker:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SCHEDULER_DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      - SCHEDULER_AWS_ENDPOINT_URL=http://localstack:4566
      - SCHEDULER_CRM_BASE_URL=http://mock-crm:9003
    command: ["uv", "run", "python", "-m", "crm_worker.main"]

  dashboard:
    build:
      context: .
      dockerfile: src/campaign_api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - SCHEDULER_DATABASE_URL=postgresql+psycopg://scheduler:scheduler@postgres:5432/scheduler
      - SCHEDULER_AWS_ENDPOINT_URL=http://localstack:4566
    command: ["uv", "run", "uvicorn", "dashboard.main:app", "--host", "0.0.0.0", "--port", "9100"]
    ports:
      - "9100:9100"
